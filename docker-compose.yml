version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: clinic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clinica
      POSTGRES_USER: clinic_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-clinic_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic_user -d clinica"]
      interval: 5s
      timeout: 5s
      retries: 10

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinic_agent
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      MODEL: ${MODEL:-gemini-2.5-flash}
      DATABASE_URL: postgresql://clinic_user:${DB_PASSWORD:-clinic_secret}@postgres:5432/clinica
      WORKSPACE_PATH: /workspace
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: /logs/agent.log
    volumes:
      - ./workspace:/workspace
      - ./logs:/logs      
    ports:
      - "8000:8000"     # ADK Web UI
    # Inicia directamente con la web UI de ADK
    command: adk web /app --host 0.0.0.0 --port 8000
    stdin_open: true
    tty: true

volumes:
  postgres_data: